name: YouTube Shorts Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneleri yükle
        run: |
          pip install google-api-python-client
          pip install google-auth-oauthlib
          pip install moviepy

      - name: Botu çalıştır
        run: python otomatik_yükleme.py
